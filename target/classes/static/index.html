<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <!-- Sidebar -->
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <span>🔹 ExpenseTracker</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item">
                <a href="index.html" class="nav-link active">
                    <span class="nav-icon">📊</span> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="transactions.html" class="nav-link">
                    <span class="nav-icon">📝</span> Transactions
                </a>
            </li>
            <li class="nav-item">
                <a href="profile.html" class="nav-link">
                    <span class="nav-icon">👤</span> Profile
                </a>
            </li>
        </ul>
        <div class="user-profile">
            <div id="user-display" class="user-info">Loading User...</div>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <div>
                <h1>Dashboard</h1>
                <div class="date-display" id="current-date">October 25, 2023</div>
            </div>
            <!-- Optional Top Right Elements -->
        </header>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Hero Card: Net Worth (Balance) -->
            <div class="card net-worth-card">
                <h3>Total Balance</h3>
                <div class="amount" id="total-balance">₹0.00</div>
                <p>Available Balance</p>
            </div>

            <!-- Spending Summary -->
            <div class="card">
                <h3>Total Spendings</h3>
                <div class="amount-large" id="total-expense">₹0.00</div>
                <!-- Mini Sparkline placeholder -->
                <div style="height: 50px; margin-top: 1rem; opacity: 0.5;">
                    <canvas id="expenseSparkline"></canvas>
                </div>
            </div>

            <!-- Income Summary -->
            <div class="card">
                <h3>Total Income</h3>
                <div class="amount-large" id="total-income">₹0.00</div>
                <!-- Mini Sparkline placeholder -->
                <div style="height: 50px; margin-top: 1rem; opacity: 0.5;">
                    <canvas id="incomeSparkline"></canvas>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="card span-2">
                <h3>Income vs Expenses</h3>
                <div class="chart-container">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Spending by Category</h3>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            <!-- Recent Activity -->
            <div class="card span-2">
                <h3>Recent Activity</h3>
                <ul id="transaction-list" style="list-style: none; padding: 0;">
                    <!-- Populated by JS -->
                </ul>
            </div>
        </div>

    </main>
    <script src="script.js"></script>
</body>

</html>
