<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Sidebar -->
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <span>🔹 ExpenseTracker</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item">
                <a href="index.html" class="nav-link">
                    <span class="nav-icon">📊</span> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="transactions.html" class="nav-link active">
                    <span class="nav-icon">📝</span> Transactions
                </a>
            </li>
            <li class="nav-item">
                <a href="profile.html" class="nav-link">
                    <span class="nav-icon">👤</span> Profile
                </a>
            </li>
        </ul>
        <div class="user-profile">
            <div id="user-display" class="user-info">Loading User...</div>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <h1>Transactions</h1>
        </header>

        <div class="form-grid">
            <!-- Income Form -->
            <div class="card">
                <h3>Add Income (+ Inflow)</h3>
                <form id="income-form">
                    <div class="form-group">
                        <label>Source</label>
                        <input type="text" id="income-source" placeholder="e.g. Salary, Freelance" required>
                    </div>
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="income-amount" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="income-date" required>
                    </div>
                    <button type="submit" class="btn-primary" style="background-color: var(--success-color);">Add
                        Income</button>
                </form>
            </div>

            <!-- Expense Form -->
            <div class="card">
                <h3>Add Expense (- Outflow)</h3>
                <form id="expense-form">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="expense-desc" placeholder="e.g. Rent, Grocery" required>
                    </div>
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="expense-amount" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="expense-date" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="expense-category" required>
                            <option value="" disabled selected>Select Category</option>
                            <!-- Populated by JS -->
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" style="background-color: var(--danger-color);">Add
                        Expense</button>
                </form>
            </div>
        </div>

        <div class="card" style="margin-top: 2rem;">
            <h3>Recent Transactions</h3>
            <div style="overflow-x: auto;">
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
