<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <span>🔹 ExpenseTracker</span>
        </a>
        <ul class="nav-links">
            <li class="nav-item">
                <a href="index.html" class="nav-link">
                    <span class="nav-icon">📊</span> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="transactions.html" class="nav-link">
                    <span class="nav-icon">📝</span> Transactions
                </a>
            </li>
            <li class="nav-item">
                <a href="profile.html" class="nav-link active">
                    <span class="nav-icon">👤</span> Profile
                </a>
            </li>
        </ul>
        <div class="user-profile">
            <div id="user-display" class="user-info">Loading User...</div>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <h1>Your Profile</h1>
        </header>

        <div class="profile-container" style="max-width: 500px; margin: 0 auto;">
            <!-- Profile Header Card -->
            <div class="card profile-card">
                <div class="profile-header-bg"></div>
                <div class="profile-avatar">
                    <span id="profile-initials">U</span>
                </div>

                <div class="profile-body">
                    <h2 id="profile-name-display" class="profile-name">User Name</h2>
                    <p class="profile-role">Expense Tracker Member</p>

                    <form id="profile-form" class="profile-form">
                        <div class="form-group">
                            <label>Username</label>
                            <div class="input-wrapper">
                                <span class="input-icon">👤</span>
                                <input type="text" id="profile-username" readonly>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <div class="input-wrapper">
                                <span class="input-icon">📧</span>
                                <input type="email" id="profile-email" readonly>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Member Since</label>
                            <div class="input-wrapper">
                                <span class="input-icon">📅</span>
                                <input type="text" id="profile-date" readonly>
                            </div>
                        </div>

                        <div class="profile-actions">
                            <button type="button" id="edit-profile-btn" class="btn-primary">Edit Profile</button>
                            <button type="button" id="change-password-btn" class="btn-secondary">Change
                                Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
